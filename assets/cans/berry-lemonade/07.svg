<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 267 760" width="267" height="760">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9c0035"/>
      <stop offset="0.5" stop-color="#C2185B"/>
      <stop offset="1" stop-color="#900029"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.080" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- can body -->
  <rect x="34" y="30" width="200" height="700" rx="22" fill="url(#body)"/>
  <!-- top + bottom rims -->
  <ellipse cx="134" cy="36" rx="100" ry="10" fill="#e03679"/>
  <ellipse cx="134" cy="724" rx="100" ry="10" fill="#880021"/>
  <!-- moving sheen -->
  <rect x="34" y="30" width="200" height="700" rx="22" fill="url(#sheen)"/>
  <!-- label band -->
  <g transform="translate(134 380) scale(0.080 1) translate(-134 -380)">
    <text x="120.0" y="374" text-anchor="middle"
      font-family="Oswald, Arial Narrow, sans-serif" font-weight="700"
      font-size="22" letter-spacing="1" fill="#ffffff" opacity="0.35"
      style="text-transform:uppercase"><tspan x="120.0" dy="0">BERRY</tspan><tspan x="120.0" dy="26">LEMONADE</tspan></text>
  </g>
  <!-- KILL CLIFF wordmark -->
  <text x="134" y="460" text-anchor="middle"
    font-family="Oswald, Arial Narrow, sans-serif" font-weight="700" font-size="13"
    letter-spacing="2" fill="#ffffff" opacity="0.28">KILL CLIFF</text>
</svg>